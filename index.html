<body>

<div class="container">

  <h1>Better Choice</h1>
  <p class="message">You can continue anytime.</p>

  <div class="habit">
  <h3>Drink water</h3>
  <p class="status">Take it one step at a time.</p>
  <button onclick="toggleDone(this)">Done</button>
</div>

  <div class="habit">
    <h3>Stretch</h3>
    <p>A small step counts.</p>
    <button>✓ Done</button>
  </div>

  <button class="add">+ Add Habit</button>

</div>
  
<script>
function toggleDone(button) {
  const habit = button.parentElement;
  const status = habit.querySelector(".status");

  if (button.classList.contains("done")) {
    button.classList.remove("done");
    button.textContent = "Done";
    status.textContent = "Take it one step at a time.";
    status.classList.remove("done-text");
  } else {
    button.classList.add("done");
    button.textContent = "✓ Done";
    status.textContent = "You showed up today.";
    status.classList.add("done-text");
  }
}
</script>
  
</body>
