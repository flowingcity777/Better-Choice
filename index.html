<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Better Choice</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>

<div class="container">

  <h1>Better Choice</h1>
  <p class="message">You can continue anytime.</p>

  <button class="add">+ Add Habit</button>
  <div class="add-section">
    <input type="text" id="habitInput" placeholder="A small step you want to take..." />
    <button onclick="addHabit()">Add</button>
  </div>

  <p id="emptyMessage">Start with one small step.</p>
  
<div id="habitList">
  <!-- habits will appear here -->
</div>
</div>
  
<script>
function toggleDone(button) {
  const habit = button.parentElement;
  const status = habit.querySelector(".status");

  if (button.classList.contains("done")) {
    button.classList.remove("done");
    button.textContent = "Done";
    status.textContent = "Take it one step at a time.";
    status.classList.remove("done-text");
  } else {
    button.classList.add("done");
    button.textContent = "✓ Done";
    status.textContent = "You showed up today.";
    status.classList.add("done-text");
  }
}

function addHabit() {
  const input = document.getElementById("habitInput");
  const value = input.value.trim();

  if (!value) return;

  const habitList = document.getElementById("habitList");
  const emptyMessage = document.getElementById("emptyMessage");

  const habit = document.createElement("div");
  habit.className = "habit";

  habit.innerHTML = `
    <h3>${value}</h3>
    <p class="status">Take it one step at a time.</p>
    <button onclick="toggleDone(this)">Done</button>
  `;

  habitList.appendChild(habit);
  emptyMessage.style.display = "none";
  input.value = "";
}

window.addEventListener("DOMContentLoaded", () => {
  const emptyMessage = document.getElementById("emptyMessage");
  const starterHabits = document.querySelectorAll(".habit");

  if (starterHabits.length > 0) {
    emptyMessage.style.display = "none";
  }
});
</script>
  
</body>
